name: Feature request
description: Suggest a Keepa CLI, Agent, MCP, or reporting workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the workflow outcome first. Keepa CLI is offline-first by default, so mention whether the proposal needs live tokens.
  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What are you trying to accomplish?
      placeholder: I want an Agent to compare products from a category and...
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What is missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: What should the CLI, MCP tool, or output contract do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - products / product view
        - category / finder / deals
        - seller / tracking
        - MCP / stdio / Agent contract
        - TUI
        - reports / browse snapshots
        - cache / cassettes / evidence
        - packaging / CI
    validations:
      required: true
